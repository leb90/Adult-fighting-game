<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FYTEFANS - Ultimate Fighter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/Adult-fighting-game/assets/index-q_a5OIe9.js"></script>
  <link rel="stylesheet" crossorigin href="/Adult-fighting-game/assets/index-Ck7upHsf.css">
</head>
<body>
  <!-- Start Screen -->
  <div id="startScreen">

    <!-- Pane 1: Title -->
    <div id="titlePane">
      <div class="logo-container">
        <h1 class="main-logo">FYTEFANS</h1>
        <p class="tagline">ULTIMATE FIGHTER</p>
      </div>
      <div class="start-content">
        <button id="startBtn" class="neon-btn"><span>START FIGHT</span></button>
        <div class="controls-info">
          <div class="player-controls">
            <h3>PLAYER 1</h3>
            <p>Move: <span class="key">A</span> <span class="key">D</span></p>
            <p>Jump: <span class="key">W</span></p>
            <p>Attack: <span class="key">SPACE</span></p>
            <p>ULTIMATE: <span class="key">Q</span></p>
          </div>
          <div class="player-controls">
            <h3>PLAYER 2</h3>
            <p>Move: <span class="key">&larr;</span> <span class="key">&rarr;</span></p>
            <p>Jump: <span class="key">&uarr;</span></p>
            <p>Attack: <span class="key">&darr;</span></p>
            <p>ULTIMATE: <span class="key">/</span></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Pane 2: Mode Select -->
    <div id="modePane" class="select-pane" style="display:none">
      <h2 class="select-title">SELECT MODE</h2>
      <div class="select-buttons">
        <button id="mode1v1Btn" class="neon-btn select-btn">
          <span class="select-btn-title">1 VS 1</span>
          <span class="select-btn-sub">TWO PLAYERS</span>
        </button>
        <button id="mode1vpcBtn" class="neon-btn select-btn">
          <span class="select-btn-title">1 VS PC</span>
          <span class="select-btn-sub">VS COMPUTER</span>
        </button>
      </div>
    </div>

    <!-- Pane 3: Character Select (1vPC only) -->
    <div id="charPane" class="select-pane" style="display:none">
      <h2 class="select-title">SELECT YOUR FIGHTER</h2>
      <div class="select-buttons">
        <button id="charRukiBtn" class="neon-btn select-btn char-btn" data-char="ruki">
          <span class="select-btn-title ruki-color">RUKI</span>
          <span class="select-btn-sub">PLAYER FIGHTER</span>
        </button>
        <button id="charChunBtn" class="neon-btn select-btn char-btn" data-char="chun">
          <span class="select-btn-title chun-color">CHUN</span>
          <span class="select-btn-sub">PLAYER FIGHTER</span>
        </button>
      </div>
    </div>

  </div>

  <!-- Game Container -->
  <div id="gameContainer" style="display: none;">
    <div class="game-wrapper">
      <!-- HUD -->
      <div class="hud">
        <!-- Player 1 Section -->
        <div class="player-section p1">
          <div class="player-name" id="p1Label">PLAYER 1</div>
          <div class="health-container">
            <div class="health-bg"></div>
            <div id="playerHealth" class="health-bar"></div>
          </div>
          <div class="ultimate-container">
            <div class="ultimate-label">ULTIMATE</div>
            <div class="ultimate-bg">
              <div id="playerUltimate" class="ultimate-bar"></div>
            </div>
            <div id="playerUltReady" class="ult-ready">READY!</div>
          </div>
          <div class="win-dots" id="playerWinDots">
            <span class="win-dot"></span>
            <span class="win-dot"></span>
          </div>
        </div>

        <!-- Timer -->
        <div class="timer-section">
          <div id="timer" class="timer">60</div>
          <div id="roundLabel" class="round-label">ROUND 1</div>
          <div class="brand-badge">FYTEFANS</div>
        </div>

        <!-- Player 2 Section -->
        <div class="player-section p2">
          <div class="player-name" id="p2Label">PLAYER 2</div>
          <div class="health-container">
            <div class="health-bg"></div>
            <div id="enemyHealth" class="health-bar"></div>
          </div>
          <div class="ultimate-container">
            <div class="ultimate-label">ULTIMATE</div>
            <div class="ultimate-bg">
              <div id="enemyUltimate" class="ultimate-bar"></div>
            </div>
            <div id="enemyUltReady" class="ult-ready">READY!</div>
          </div>
          <div class="win-dots" id="enemyWinDots">
            <span class="win-dot"></span>
            <span class="win-dot"></span>
          </div>
        </div>
      </div>

      <!-- Game Display Text -->
      <div id="displayText" class="display-text">
        <span class="winner-text"></span>
        <span class="press-any-key">PRESS ANY KEY TO RETURN TO MENU</span>
        <button id="restartBtn" class="neon-btn small">BACK TO MENU</button>
      </div>

      <!-- Ultimate Animation Overlay -->
      <div id="ultimateOverlay" class="ultimate-overlay">
        <div class="ultimate-text">ULTIMATE!</div>
      </div>

      <!-- Shop GIF (rendered as HTML so the browser anima it natively) -->
      <img id="shopGif" src="/Adult-fighting-game/img/shop2.gif" alt="" class="shop-gif" />

      <!-- Canvas -->
      <canvas id="gameCanvas"></canvas>

      <!-- Win GIFs (shown when a round ends) -->
      <img id="winGifPlayer" class="win-gif" src="" alt="" />
      <img id="winGifEnemy" class="win-gif" src="" alt="" />

      <!-- Round banner (shown between rounds) -->
      <div id="roundBanner" class="round-banner"></div>

      <!-- Ultimate animation -->
      <div id="ultFlash" class="ult-flash"></div>
      <img id="cumGif" class="cum-gif" src="" alt="" />

      <!-- Combo Display -->
      <div id="comboP1" class="combo-display left"></div>
      <div id="comboP2" class="combo-display right"></div>
    </div>
  </div>

</body>
</html>
